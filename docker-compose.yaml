services:
  web:
    build:
      context: ./web
    image: cur10usx-app
    # Sem user: override — o utilizador "nextjs" (1001) do Dockerfile é usado
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    environment:
      - NODE_ENV=development
    command: pnpm dev

volumes:
  web_node_modules:
  web_next:
