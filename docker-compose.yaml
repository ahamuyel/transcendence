services:
  web:
    build:
      context: ./web
    user: "${UID}:${GID}"
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules   
      - /app/.next        
    command: npm run dev

  api:
    build:
      context: ./api
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./api:/app
      - /app/node_modules 