services:
  web:
    build:
      context: ./web
    image: cur10usx-web
    # Sem user: override — o utilizador "nextjs" (1001) do Dockerfile é usado
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next          # Volume nomeado — Docker respeita o chown do Dockerfile
    environment:
      - NODE_ENV=development
    command: npm run dev

  api:
    build:
      context: ./api
    image: cur10usx-api
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules

volumes:
  web_node_modules:
  web_next:
  api_node_modules: