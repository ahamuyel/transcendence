apiVersion: apps/v1
kind: Deployment
metadata:
  name: cur10usx-web
  labels:
    app: cur10usx-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cur10usx-web
  template:
    metadata:
      labels:
        app: cur10usx-web
    spec:
      containers:
        - name: web
          image: albertoih/cur10usx-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "http://cur10usx-api-service:4200"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi" # Next.js costuma precisar de um pouco mais que 128Mi
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: / 
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10